name: Publish to npm on version change

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    if: ${{ vars.ENABLE_AUTO_PUBLISH == 'true' }}
    uses: ./.github/workflows/ci.yml
    with:
      run-tests: false

  publish:
    if: ${{ vars.ENABLE_AUTO_PUBLISH == 'true' }}
    needs:
      - ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ steps.meta.outputs.version }}"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          else
            PREV_VERSION=""
          fi

          echo "previous=$PREV_VERSION" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_VERSION" ] && [ "$CURRENT_VERSION" = "$PREV_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change detected ($CURRENT_VERSION)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${PREV_VERSION:-<none>} -> $CURRENT_VERSION"
          fi

      - name: Check if version already exists on npm
        id: npm_check
        if: steps.version_check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="${{ steps.meta.outputs.name }}"
          VERSION="${{ steps.meta.outputs.version }}"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} already exists on npm. Skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} not found on npm. Will publish."
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.changed == 'true' && steps.npm_check.outputs.publish == 'true'
        run: bun install --frozen-lockfile

      - name: Publish package to npm
        if: steps.version_check.outputs.changed == 'true' && steps.npm_check.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
